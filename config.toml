base_url = "https://TheGKRK.github.io/"
title = "TheGKRK Blog"
description = ""
build_search_index = false
generate_feeds = true
compile_sass = true
minify_html = true
taxonomies = [{ name = "tags" }]

[markdown.highlighting]
enabled = true
theme = "github-light"
extra_syntaxes = ["syntaxes"]

[extra]
toc = true
use_cdn = false
favicon = "/favicons/favicon.ico"
theme = "toggle" # light, dark, auto, toggle
comment = false
fancy_code = true
dynamic_note = true # a note that can be toggled
mathjax = true
mathjax_dollar_inline_enable = true
katex_enable = true
katex_auto_render = true
repo_url = "https://github.com/TheGKRK/TheGKRK.github.io/"
menu = [
    { name = "CV", url = "/cv", weight = 2 },
    { name = "Archive", url = "/archive", weight = 3 },
    { name = "Tags", url = "/tags", weight = 4 },
]
socials = [
    { name = "github", url = "https://github.com/TheGKRK/", icon = "github" },
    { name = "twitter", url = "https://x.com/TheGKRK/", icon = "twitter" },
    { name = "linkedin", url = "https://linkedin.com/in/thegkrk/", icon = "linkedin" },
    { name = "Email", url = "mailto: your@email.com", icon = "email" }
]
custom_css = []


[extra.analytics]
enabled = false

[extra.analytics.goatcounter]
user = "thegkrk"
host = "goatcounter.com" # default= goatcounter.com
